<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Fund Flow — Web3 Threat Tracker</title>
    <link rel="stylesheet" href="../css/pico.min.css" />
    <link rel="stylesheet" href="../css/app.css" />
</head>
<body>
    <header>
        <nav>
            <ul>
                <li><a href="../index.html">Dashboard</a></li>
                <li><a href="../search.html">Search</a></li>
                <li><a href="fund-flow.html" class="active">Fund Flow</a></li>
                <li><a href="gas-tracer.html">Gas Tracer</a></li>
                <li><a href="contract-audit.html">Contract Audit</a></li>
                <li><a href="mint-tracker.html">Mint Tracker</a></li>
                <li><a href="cctp-tracer.html">CCTP Tracer</a></li>
            </ul>
        </nav>
        <hgroup>
            <h1>Fund Flow Tracer</h1>
            <p>Trace on-chain fund movements from an address</p>
        </hgroup>
    </header>

    <main>
        <section class="api-key-section" id="etherscan-key-section">
            <label for="api-key-input">Etherscan API Key</label>
            <div class="api-key-row">
                <input
                    id="api-key-input"
                    type="password"
                    placeholder="Enter your Etherscan API key"
                    aria-label="Etherscan API key"
                />
                <button id="save-api-key">Save</button>
            </div>
            <small>
                Get a free key at <a href="https://etherscan.io/apis" target="_blank" rel="noopener noreferrer">etherscan.io/apis</a>
            </small>
        </section>

        <section class="api-key-section" id="helius-key-section" style="display:none">
            <label for="helius-key-input">Helius API Key</label>
            <div class="api-key-row">
                <input
                    id="helius-key-input"
                    type="password"
                    placeholder="Enter your Helius API key"
                    aria-label="Helius API key"
                />
                <button id="save-helius-key">Save</button>
            </div>
            <small>
                Get a free key at <a href="https://www.helius.dev/" target="_blank" rel="noopener noreferrer">helius.dev</a>
            </small>
        </section>

        <section>
            <form id="trace-form">
                <label for="chain-select">Chain</label>
                <select id="chain-select">
                    <option value="1" selected>Ethereum</option>
                    <option value="56">BSC</option>
                    <option value="137">Polygon</option>
                    <option value="42161">Arbitrum</option>
                    <option value="8453">Base</option>
                    <option value="10">Optimism</option>
                    <option value="solana">Solana</option>
                    <option value="bitcoin">Bitcoin</option>
                </select>
                <label for="address-input">Address</label>
                <input
                    id="address-input"
                    type="text"
                    placeholder="0x..."
                    required
                    aria-label="Address"
                    class="mono"
                />
                <button type="submit">Trace</button>
            </form>
        </section>

        <section>
            <div id="results">
                <!-- Results injected by fund-flow.js -->
            </div>
        </section>
    </main>

    <script src="../js/common.js"></script>
    <script src="../js/ui.js"></script>
    <script src="../js/solana-adapter.js"></script>
    <script src="../js/bitcoin-adapter.js"></script>
    <script src="../js/chain-adapter.js"></script>
    <script src="../js/d3.min.js"></script>
    <script src="../js/flow-graph.js"></script>
    <script src="../js/playbooks/fund-flow.js"></script>
</body>
</html>
