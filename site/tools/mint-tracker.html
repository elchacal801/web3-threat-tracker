<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mint Tracker — Web3 Threat Tracker</title>
    <link rel="stylesheet" href="../css/pico.min.css" />
    <link rel="stylesheet" href="../css/app.css" />
</head>
<body>
    <header>
        <nav>
            <ul>
                <li><a href="../index.html">Dashboard</a></li>
                <li><a href="../search.html">Search</a></li>
                <li><a href="fund-flow.html">Fund Flow</a></li>
                <li><a href="gas-tracer.html">Gas Tracer</a></li>
                <li><a href="contract-audit.html">Contract Audit</a></li>
                <li><a href="mint-tracker.html" class="active">Mint Tracker</a></li>
                <li><a href="cctp-tracer.html">CCTP Tracer</a></li>
            </ul>
        </nav>
        <hgroup>
            <h1>Mint Tracker</h1>
            <p>Track token mint events for a contract</p>
        </hgroup>
    </header>

    <main>
        <section class="api-key-section">
            <label for="api-key-input">Etherscan API Key</label>
            <div class="api-key-row">
                <input
                    id="api-key-input"
                    type="password"
                    placeholder="Enter your Etherscan API key"
                    aria-label="Etherscan API key"
                />
                <button id="save-api-key">Save</button>
            </div>
            <small>
                Get a free key at <a href="https://etherscan.io/apis" target="_blank" rel="noopener noreferrer">etherscan.io/apis</a>
            </small>
        </section>

        <section>
            <form id="trace-form">
                <label for="address-input">Token Contract Address</label>
                <input
                    id="address-input"
                    type="text"
                    placeholder="0x..."
                    required
                    aria-label="Token contract address"
                    class="mono"
                />
                <div role="group">
                    <input
                        id="from-block"
                        type="text"
                        placeholder="0"
                        aria-label="From block"
                    />
                    <input
                        id="to-block"
                        type="text"
                        placeholder="latest"
                        aria-label="To block"
                    />
                </div>
                <label for="decimals-input">Token Decimals</label>
                <input
                    id="decimals-input"
                    type="text"
                    placeholder="auto-detect"
                    aria-label="Token decimals"
                />
                <button type="submit">Trace</button>
            </form>
        </section>

        <section>
            <div id="results">
                <!-- Results injected by mint-tracker.js -->
            </div>
        </section>
    </main>

    <script src="../js/common.js"></script>
    <script src="../js/ui.js"></script>
    <script src="../js/playbooks/mint-tracker.js"></script>
</body>
</html>
